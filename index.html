<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klar World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0F1D45;
      --navy-deep: #0A1330;
      --gold: #C9A227;
      --red: #E5222A;
      --ivory: #FFFFFF;
      --muted: rgba(255, 255, 255, 0.62);
      --font: 'Sora', sans-serif;
    }

    html {
      height: 100%;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--navy-deep);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    .backdrop-spark {
      position: fixed;
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
      }
    }

    .page {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      background: linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    .page-spark {
      position: absolute;
      pointer-events: none;
      z-index: 3;
      opacity: 0.6;
    }

    .hero-gap {
      background: var(--ivory);
      height: clamp(20px, 4vw, 36px);
      position: relative;
      z-index: 2;
    }

    @media (max-width: 360px) {
      .page {
        font-size: 15px;
      }
    }

    .hero {
      background: var(--ivory);
      padding: clamp(40px, 9vw, 56px) clamp(20px, 6vw, 32px) clamp(48px, 10vw, 64px);
      text-align: center;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 42px;
      background: var(--ivory);
      border-bottom: 3px solid var(--red);
      border-radius: 0 0 50% 50% / 0 0 100% 100%;
    }

    .hero img {
      width: min(260px, 68%);
      height: auto;
      display: block;
      margin: 0 auto 18px;
    }

    .hero .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 4px;
    }

    .hero .divider span {
      height: 1px;
      width: 44px;
      background: var(--navy);
      opacity: .5;
    }

    .hero .divider p {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.32em;
      color: var(--navy);
    }

    .links {
      padding: clamp(28px, 6vw, 44px) clamp(16px, 5vw, 28px) clamp(20px, 5vw, 32px);
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 2.5vw, 16px);
      position: relative;
      z-index: 2;
    }

    @media (min-width: 768px) {
      .links {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: clamp(14px, 2vw, 20px);
        padding-left: clamp(24px, 4vw, 48px);
        padding-right: clamp(24px, 4vw, 48px);
        align-items: stretch;
      }
    }

    .link-card {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.02));
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      padding: clamp(13px, 3.5vw, 18px) clamp(14px, 4vw, 20px);
      display: grid;
      grid-template-columns: clamp(38px, 10vw, 48px) 1fr 20px;
      align-items: center;
      gap: clamp(10px, 3vw, 16px);
      transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
    }

    .link-card:hover,
    .link-card:focus-visible {
      transform: translateY(-2px);
      border-color: var(--gold);
      background: linear-gradient(135deg, rgba(201, 162, 39, 0.14), rgba(255, 255, 255, 0.03));
      outline: none;
    }

    .icon-circle {
      width: clamp(38px, 10vw, 48px);
      height: clamp(38px, 10vw, 48px);
      border-radius: 50%;
      border: 1.4px solid var(--ivory);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ivory);
      flex-shrink: 0;
    }

    .icon-circle svg {
      width: clamp(15px, 4vw, 20px);
      height: clamp(15px, 4vw, 20px);
    }

    .link-text {
      min-width: 0;
    }

    .link-text .title {
      display: block;
      font-size: clamp(15px, 3.6vw, 17px);
      font-weight: 600;
      color: var(--ivory);
      margin-bottom: 2px;
      overflow-wrap: break-word;
    }

    .link-text .subtitle {
      display: block;
      font-size: clamp(11.5px, 2.8vw, 13px);
      color: var(--muted);
      overflow-wrap: break-word;
    }

    .ext-icon {
      color: var(--muted);
    }

    .ext-icon svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .footer {
      text-align: center;
      padding: 12px clamp(16px, 5vw, 24px) clamp(28px, 6vw, 40px);
      color: rgba(255, 255, 255, 0.35);
      font-size: 12px;
      line-height: 1.7;
    }
  </style>
</head>
